version: 2

models:
  - name: silver_orders
    description: "Cleaned and validated orders from bronze layer"
    columns:
      - name: id
        description: "Unique order identifier"
        data_tests:
          - unique
          - not_null

      - name: status
        description: "Order status — always uppercase"
        data_tests:
          - accepted_values:
              arguments:
                values: ['COMPLETED', 'PENDING', 'REFUNDED']

      - name: amount
        description: "Order amount in USD — null means bad source data"
        data_tests:
          - not_null:
              config:
                where: "is_valid = true"